<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Appraisal System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
<style>
        .company-logo {
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-clipboard-list me-2"></i>Appraisal System
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" id="userDisplay"></span>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-user me-2"></i>Employee Information
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Employee Name</label>
                                    <input type="text" class="form-control" id="employeeName" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Employee ID</label>
                                    <input type="text" class="form-control" id="employeeId" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Department</label>
                                    <input type="text" class="form-control" id="department" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Designation</label>
                                    <input type="text" class="form-control" id="designation" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Appraisal Period *</label>
                                    <input type="text" class="form-control" id="appraisalPeriod" value="2025-2026" readonly>
                                </div>
                            </div>
                            <div class="col-md-6" id="employeeSelectionContainer" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Select Employee</label>
                                    <input type="text" class="form-control mb-2" id="employeeSearch" placeholder="Search employees..." style="display: none;">
                                    <select class="form-select" id="employeeSelect" size="1">
                                        <option value="">Choose an employee...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Status</label>
                                    <input type="text" class="form-control" id="appraisalStatus" readonly value="In Progress">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-tasks me-2"></i>Appraisal Actions
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered" id="kraTable">
                                <thead class="table-light">
                                    <tr>
                                        <th width="25%">KRA</th>
                                        <th width="37.5%">Self Submission</th>
                                        <th width="37.5%">Manager Submission</th>
                                    </tr>
                                </thead>
                                <tbody id="kraTableBody">
                                    <!-- KRA rows will be dynamically generated -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-chart-line me-2"></i>Overall Summary
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Average Self Rating</label>
                                    <input type="text" class="form-control" id="avgSelfRating" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Average Supervisor Rating</label>
                                    <input type="text" class="form-control" id="avgSupervisorRating" readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4 mb-4">
            <div class="col-12 text-center">
                <button class="btn btn-success btn-lg me-2" id="submitBtn" onclick="submitAppraisal()">
                    <i class="fas fa-paper-plane me-2"></i>Submit Appraisal
                </button>
                <button class="btn btn-secondary btn-lg" onclick="logout()">
                    <i class="fas fa-arrow-left me-2"></i>Logout
                </button>
            </div>
        </div>
        <div class="row mt-4" id="pendingReviewsSection" style="display: none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-warning text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-exclamation-triangle me-2"></i>Pending Reviews
                        </h4>
                    </div>
                    <div class="card-body">
                        <div id="pendingReviewsList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Appraisal History Section -->
        <div class="row mt-4" id="historySection" style="display: none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-history me-2"></i>Appraisal History
                        </h4>
                    </div>
                    <div class="card-body">
                        <div id="historyList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 mb-0">Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">
                        <i class="fas fa-check-circle me-2"></i>Success
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="successMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="appraisal.js"></script>
</body>
</html>
